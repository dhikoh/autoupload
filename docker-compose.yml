# ── AutoPost Hub — Docker Compose (Production) ──
# Deploy on Coolify or any Docker host
# Domain: up.modula.click (frontend) + api.up.modula.click (backend)

services:
  # FastAPI Backend
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=sqlite:///./autopost.db
      - UPLOAD_DIR=./uploads
      - REDIS_URL=redis://redis:6379/0
      - USE_CELERY=false
      - FRONTEND_URL=https://up.modula.click
    volumes:
      - backend-data:/app/uploads
      - backend-db:/app
    depends_on:
      - redis
    restart: unless-stopped

  # Redis (for Celery task queue — optional in sync mode)
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://api.up.modula.click
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-db:
