# ── AutoPost Hub — Docker Compose (Production) ──
# Domain: up.modula.click (frontend) | api.up.modula.click (backend)
#
# Usage:
#   1. Copy backend/.env.example to backend/.env and fill in values
#   2. docker compose up -d

services:
  # ── FastAPI Backend ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Security
      SECRET_KEY: ${SECRET_KEY}
      # Superadmin (required on first run)
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      SUPERADMIN_NAME: ${SUPERADMIN_NAME:-Super Admin}
      # Database
      DATABASE_URL: sqlite:////app/data/autopost.db
      # File storage
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-500}
      # CORS
      FRONTEND_URL: ${FRONTEND_URL:-https://up.modula.click}
      # Token
      ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS:-7}
      # Celery (disabled by default — uses sync mode)
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: ${USE_CELERY:-false}
    volumes:
      - backend-uploads:/app/uploads
      - backend-db:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Redis (optional — for Celery async mode) ───
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.up.modula.click}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  backend-uploads:
  backend-db:
  redis-data:
