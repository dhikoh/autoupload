# ── AutoPost Hub — Nginx Configuration ──
# Place this file at /etc/nginx/sites-available/autoposthub
# Symlink: ln -s /etc/nginx/sites-available/autoposthub /etc/nginx/sites-enabled/
#
# This config assumes:
#   - Frontend running on localhost:3000
#   - Backend running on localhost:8000
#   - SSL certificates handled by Certbot/Let's Encrypt
#
# If using Coolify/Traefik, use the docker-compose Nginx service instead.

# ── Rate Limit Zones ────────────────────────────────────────────────────────────
# These are applied at the Nginx level (before FastAPI — true first line of defense)

# Login endpoint: 5 requests per minute per IP
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;

# Register endpoint: 3 requests per minute per IP
limit_req_zone $binary_remote_addr zone=register_zone:10m rate=3r/m;

# Upload endpoint: 20 requests per 10 minutes = ~2 per minute per IP
limit_req_zone $binary_remote_addr zone=upload_zone:20m rate=2r/m;

# General API: 60 requests per minute per IP (generous for normal browsing)
limit_req_zone $binary_remote_addr zone=api_zone:20m rate=60r/m;

# ── Upstream ────────────────────────────────────────────────────────────────────
upstream backend {
    server localhost:8000;
    keepalive 32;
}

upstream frontend {
    server localhost:3000;
    keepalive 16;
}

# ── HTTP → HTTPS Redirect ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name up.modula.click api.up.modula.click;
    return 301 https://$host$request_uri;
}

# ── API Backend ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.up.modula.click;

    # SSL (managed by Certbot — do not edit manually)
    ssl_certificate     /etc/letsencrypt/live/api.up.modula.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.up.modula.click/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Pass real client IP to backend (for rate limiting and IP blocklist)
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 0.0.0.0/0;

    # Max request body size (video uploads up to 600MB)
    client_max_body_size 600M;
    client_body_timeout 120s;

    # ── Endpoint-specific rate limits ────────────────────────────────────────
    location = /api/auth/login {
        limit_req zone=login_zone burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
        include /etc/nginx/proxy_params;
    }

    location = /api/auth/register {
        limit_req zone=register_zone burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
        include /etc/nginx/proxy_params;
    }

    location = /api/upload {
        limit_req zone=upload_zone burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
        include /etc/nginx/proxy_params;
        # Longer timeout for file uploads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── General API (with generous limit) ────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
        include /etc/nginx/proxy_params;
    }

    # Health check — no rate limit
    location = /api/health {
        proxy_pass http://backend;
        include /etc/nginx/proxy_params;
    }
}

# ── Frontend ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name up.modula.click;

    ssl_certificate     /etc/letsencrypt/live/up.modula.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/up.modula.click/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.up.modula.click;" always;

    location / {
        proxy_pass http://frontend;
        include /etc/nginx/proxy_params;
        # Next.js SSR needs these
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets
    location /_next/static/ {
        proxy_pass http://frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
